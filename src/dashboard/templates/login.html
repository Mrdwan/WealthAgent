{% extends "base.html" %}
{% block title %}Login — WealthAgent{% endblock %}
{% block content %}
<article style="max-width: 400px; margin: 4rem auto;">
    <header><h2>WealthAgent</h2></header>
    {% if error %}
    <p class="error" style="color: var(--pico-color-red-500);">{{ error }}</p>
    {% endif %}
    <form method="post" action="/login">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Dashboard password" required autofocus>
        <button type="submit" class="contrast">Login</button>
    </form>
</article>
{% endblock %}
