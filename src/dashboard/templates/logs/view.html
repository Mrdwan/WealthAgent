{% extends "base.html" %}
{% block title %}{{ filename }} — WealthAgent{% endblock %}
{% block content %}
<div style="margin-bottom: 1rem;">
    <a href="/logs">← Back to Logs</a>
</div>
<hgroup>
    <h2>{{ filename }}</h2>
    <p>{{ line_count }} lines</p>
</hgroup>
<article>
<pre style="overflow-x: auto; font-size: 0.8rem; line-height: 1.4;">{% for line in lines %}{{ "%5d" | format(loop.index) }}  {{ line }}
{% endfor %}</pre>
</article>
{% endblock %}
