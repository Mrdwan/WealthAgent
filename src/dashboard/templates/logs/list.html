{% extends "base.html" %}
{% block title %}Logs — WealthAgent{% endblock %}
{% block content %}
<h2>Log Files</h2>
{% if log_files %}
<figure>
<table>
    <thead>
        <tr><th>Date</th><th>File</th><th>Size</th></tr>
    </thead>
    <tbody>
        {% for f in log_files %}
        <tr>
            <td>{{ f.date.strftime('%d %b %Y') }}</td>
            <td><a href="/logs/{{ f.filename }}">{{ f.filename }}</a></td>
            <td>{{ f.size_kb }} KB</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
</figure>
{% else %}
<p>No log files found.</p>
{% endif %}
{% endblock %}
