repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: pytest-coverage
        name: pytest (100% line + branch coverage)
        entry: uv run pytest --cov --cov-branch --cov-report=term-missing --no-header -q
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
