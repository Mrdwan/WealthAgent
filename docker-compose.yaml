services:
  ollama:
    image: ollama/ollama
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - wealthnet
    healthcheck:
      test: ["CMD-SHELL", "ollama list | grep -q ${OLLAMA_MODEL:-gemma4:e4b} || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  wealthagent:
    build: .
    container_name: wealthagent
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
    ports:
      - "${DASHBOARD_PORT:-8080}:8080"
    volumes:
      - ./data:/app/data
      - ./config:/app/config:ro
      - ./logs:/app/logs
    environment:
      - DASHBOARD_ENABLED=true
      - DASHBOARD_PORT=8080
      # DASHBOARD_SECRET_KEY — set in .env (required for production)
      # DASHBOARD_BASE_URL — set in .env (e.g. http://192.168.1.x:8080)
    env_file:
      - .env
    networks:
      - wealthnet

networks:
  wealthnet:
    driver: bridge

volumes:
  ollama_data: